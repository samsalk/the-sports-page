name: Update Sports Data

on:
  schedule:
    - cron: '0 10 * * *'  # 6 AM EDT (Mar–Nov, UTC-4)
    - cron: '0 11 * * *'  # 6 AM EST (Nov–Mar, UTC-5)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch sports data
        run: python backend/fetch_data.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sports data [automated]"
          file_pattern: data/sports_data.json
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
